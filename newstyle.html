<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FernieX</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07070f;
  --text:#ffffff;
  --t2:rgba(255,255,255,.55);
  --t3:rgba(255,255,255,.3);
  --c1:#4285f4;--c2:#ea4335;--c3:#fbbc04;--c4:#34a853;--c5:#a855f7;
  --font:'Outfit',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--font);color:var(--text)}
#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* SCREENS */
.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .65s cubic-bezier(.4,0,.2,1),transform .65s cubic-bezier(.4,0,.2,1)}
.screen.hidden{opacity:0;pointer-events:none;transform:translateY(-40px) scale(.98)}
.screen.entering{opacity:0;transform:translateY(20px) scale(.98)}

/* STAR */
.star-wrap{width:44px;height:44px;margin-bottom:28px;flex-shrink:0;animation:starRock 5s ease-in-out infinite}
@keyframes starRock{0%,100%{transform:rotate(0)scale(1)}25%{transform:rotate(12deg)scale(1.06)}75%{transform:rotate(-12deg)scale(1.06)}}
.star-wrap svg{width:100%;height:100%;filter:drop-shadow(0 0 14px rgba(66,133,244,.55))}

/* LOGIN */
.login-title{font-size:clamp(30px,4vw,46px);font-weight:400;text-align:center;letter-spacing:-.4px;margin-bottom:6px;line-height:1.2}
.login-title .hi{color:var(--text)}
.login-title .name{background:linear-gradient(90deg,var(--c1),var(--c2),var(--c3),var(--c4));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:600}
.login-sub{color:var(--t2);font-size:15px;text-align:center;margin-bottom:44px}

.login-form{width:100%;max-width:400px;padding:0 20px;display:flex;flex-direction:column;gap:12px}
.field input{
  width:100%;padding:15px 18px;
  background:rgba(255,255,255,.055);
  border:1px solid rgba(255,255,255,.09);
  border-radius:13px;
  font-family:var(--font);font-size:15px;color:#fff;outline:none;
  transition:border-color .2s,background .2s;
  caret-color:var(--c1);
}
.field input::placeholder{color:rgba(255,255,255,.25)}
.field input:focus{border-color:rgba(66,133,244,.45);background:rgba(66,133,244,.06)}

.btn-main{
  width:100%;padding:15px;margin-top:2px;
  background:linear-gradient(135deg,var(--c1) 0%,#5a9cf5 100%);
  border:none;border-radius:13px;
  font-family:var(--font);font-size:15px;font-weight:600;color:#fff;
  cursor:pointer;position:relative;overflow:hidden;
  box-shadow:0 4px 22px rgba(66,133,244,.38);
  transition:transform .15s,box-shadow .2s;
}
.btn-main:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(66,133,244,.55)}
.btn-main:active{transform:none}
.btn-main::after{content:'';position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.12),transparent);border-radius:inherit}
.btn-main:disabled{opacity:.45;cursor:default;transform:none}

.err-msg{min-height:18px;text-align:center;font-size:13px;color:#f87171;transition:opacity .2s}
.info-msg{min-height:18px;text-align:center;font-size:13px;color:rgba(255,255,255,.35)}

/* 2FA step */
.step-hint{color:var(--t2);font-size:14px;text-align:center;margin-bottom:14px;line-height:1.6}
#codeInput{text-align:center;letter-spacing:10px;font-size:1.5rem;font-weight:600}

/* REGISTER toggle */
.switch-link{text-align:center;font-size:13px;color:var(--t3);margin-top:6px}
.switch-link a{color:var(--c1);text-decoration:none;cursor:pointer}
.switch-link a:hover{text-decoration:underline}

/* Rainbow animated name */
.rainbow-name{
  background:linear-gradient(90deg,#4285f4,#ea4335,#fbbc04,#34a853,#a855f7,#4285f4);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  font-weight:600;
  animation:rainbowFlow 3s linear infinite;
}
@keyframes rainbowFlow{0%{background-position:0% center}100%{background-position:200% center}}

/* CHAT SCREEN */
#chatScreen{justify-content:flex-start;padding-top:0}
.chat-header{width:100%;max-width:860px;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.model-pill{display:flex;align-items:center;gap:7px;padding:8px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:100px;font-size:14px;font-weight:500;color:var(--t2);cursor:pointer;transition:all .2s}
.model-pill:hover{background:rgba(255,255,255,.09);color:#fff}
.mdot{width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,var(--c1),var(--c4));animation:mdot 2s ease-in-out infinite}
@keyframes mdot{0%,100%{opacity:.5}50%{opacity:1}}
.chevron{font-size:9px;opacity:.4}
.user-chip{display:flex;align-items:center;gap:8px;padding:6px 12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:100px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;transition:all .2s}
.user-chip:hover{background:rgba(255,255,255,.09);color:#fff}
.user-chip .av{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--c1),var(--c5));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}

.chat-body{flex:1;width:100%;max-width:760px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 20px;overflow:hidden}
.chat-welcome{text-align:center;animation:fadeUp .7s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.chat-title{font-size:clamp(26px,3.5vw,40px);font-weight:400;letter-spacing:-.3px;line-height:1.25;margin-bottom:44px}
.chat-title .nm{background:linear-gradient(90deg,var(--c1),var(--c2),var(--c3),var(--c4));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:500}

.chips{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;max-width:640px}
.chip{padding:10px 17px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:100px;font-size:13.5px;color:var(--t2);cursor:pointer;transition:all .2s;white-space:nowrap}
.chip:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.18);color:#fff}

.msgs{flex:1;width:100%;max-width:760px;overflow-y:auto;padding:20px 0;display:none;flex-direction:column;gap:20px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.09) transparent}
.msgs.on{display:flex}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
.msg-u{align-self:flex-end;max-width:72%;padding:13px 17px;background:rgba(66,133,244,.13);border:1px solid rgba(66,133,244,.18);border-radius:18px 18px 4px 18px;font-size:15px;line-height:1.6;animation:fadeUp .35s ease}
.msg-ai{align-self:flex-start;max-width:82%;display:flex;gap:12px;align-items:flex-start;animation:fadeUp .35s ease}
.msg-ai-ico{width:26px;height:26px;flex-shrink:0;margin-top:3px}
.msg-ai-ico svg{width:100%;height:100%;filter:drop-shadow(0 0 6px rgba(66,133,244,.35))}
.msg-ai-txt{font-size:15px;line-height:1.7}
.typing{display:flex;gap:4px;align-items:center;padding:4px 0}
.typing span{width:5px;height:5px;border-radius:50%;animation:tp 1.2s ease-in-out infinite}
.typing span:nth-child(1){background:var(--c1);animation-delay:0s}
.typing span:nth-child(2){background:var(--c3);animation-delay:.15s}
.typing span:nth-child(3){background:var(--c4);animation-delay:.3s}
@keyframes tp{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-5px);opacity:1}}

.input-wrap{width:100%;max-width:760px;padding:0 20px 28px;flex-shrink:0}
.input-pill{width:100%;background:rgba(20,18,38,0.92);border:1px solid rgba(255,255,255,.07);border-radius:28px;padding:8px 8px 8px 22px;display:flex;align-items:center;gap:6px;transition:border-color .2s,box-shadow .2s;box-shadow:0 4px 24px rgba(0,0,0,.4)}
.input-pill:focus-within{border-color:rgba(66,133,244,.3);box-shadow:0 4px 32px rgba(66,133,244,.12)}
.inp-ta{flex:1;background:transparent;border:none;outline:none;font-family:var(--font);font-size:15px;color:#fff;resize:none;max-height:150px;min-height:24px;line-height:1.6;padding:8px 0;scrollbar-width:none;caret-color:var(--c1)}
.inp-ta::-webkit-scrollbar{display:none}
.inp-ta::placeholder{color:rgba(255,255,255,.25)}
.inp-acts{display:flex;align-items:center;gap:3px;padding-bottom:5px}
.ibtn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;background:transparent;color:var(--t2);font-size:16px;transition:all .15s}
.ibtn:hover{background:rgba(255,255,255,.07);color:#fff}
.ibtn.send{background:linear-gradient(135deg,var(--c1),#5a9cf5);color:#fff;box-shadow:0 2px 12px rgba(66,133,244,.4)}
.ibtn.send:hover{box-shadow:0 4px 20px rgba(66,133,244,.6)}
.ibtn.send:disabled{opacity:.3;cursor:default;box-shadow:none}
</style>

<!-- FernieID SDK -->
<script>
(function(){
  const API='https://ferniex-id.vercel.app';
  let KEY=null,uid=null;
  async function post(url,body){
    const r=await fetch(API+url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    return r.json();
  }
  window.FernieID={
    init(k){KEY=k;},
    async login(u,p){return post('/api/auth/login',{apiKey:KEY,username:u,password:p});},
    async verify2fa(userId,code){return post('/api/auth/verify-2fa',{apiKey:KEY,userId,code});},
    async register(u,p){return post('/api/register',{username:u,password:p});},
    setUser(d){try{localStorage.setItem('fid_user',JSON.stringify(d));}catch{}},
    getUser(){try{return JSON.parse(localStorage.getItem('fid_user'));}catch{return null;}},
    logout(){try{localStorage.removeItem('fid_user');}catch{}}
  };
})();
FernieID.init('fid_48919a000140bf6b7e7767281ffc31329647d6a5c133fe8f');
</script>

<script>
// ── BACKGROUND: ripple dots from center downward ──
const canvas=document.getElementById('bgCanvas');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();
window.addEventListener('resize',resize);

let mode='login';

function hexA(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${Math.max(0,Math.min(1,a))})`;
}

// Draw + cross shape (like Gemini grid background)
function drawCross(x,y,size,alpha,color){
  if(alpha<=0.005)return;
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.strokeStyle=color;
  ctx.lineWidth=size*0.55;
  ctx.lineCap='round';
  ctx.beginPath();
  // vertical line
  ctx.moveTo(x, y-size);
  ctx.lineTo(x, y+size);
  // horizontal line
  ctx.moveTo(x-size, y);
  ctx.lineTo(x+size, y);
  ctx.stroke();
  ctx.restore();
}

// Grid params
const GRID=20; // spacing between crosses
const COLS_GRID=['#4285f4','#ea4335','#fbbc04','#34a853','#a855f7','#06b6d4','#8888ff'];

// Each grid cell gets a random color and phase offset for pulsing
let gridCells=[];
function buildGrid(){
  gridCells=[];
  const cols=Math.ceil(W/GRID)+2;
  const rows=Math.ceil(H/GRID)+2;
  for(let gy=0;gy<rows;gy++){
    for(let gx=0;gx<cols;gx++){
      gridCells.push({
        x: gx*GRID - GRID,
        y: gy*GRID - GRID,
        phase: Math.random()*Math.PI*2,
        speed: 0.3 + Math.random()*0.8,
        color: COLS_GRID[Math.floor(Math.random()*COLS_GRID.length)],
        size: 2.2+Math.random()*1.4,
        // base brightness influenced by row (lower = brighter)
        rowFrac: gy/rows
      });
    }
  }
}
buildGrid();
window.addEventListener('resize',()=>{resize();buildGrid();});

function drawGlow(){
  // Large bottom glow — dots merge into this
  const grd=ctx.createRadialGradient(W/2,H*1.05,0,W/2,H*1.05,W*0.85);
  grd.addColorStop(0,'rgba(60,30,180,0.32)');
  grd.addColorStop(0.35,'rgba(100,40,220,0.18)');
  grd.addColorStop(0.65,'rgba(40,10,100,0.08)');
  grd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  // left tint
  const g2=ctx.createRadialGradient(W*0.1,H*0.85,0,W*0.1,H*0.85,W*0.45);
  g2.addColorStop(0,'rgba(80,40,200,0.12)');g2.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g2;ctx.fillRect(0,0,W,H);
  // right tint
  const g3=ctx.createRadialGradient(W*0.9,H*0.8,0,W*0.9,H*0.8,W*0.4);
  g3.addColorStop(0,'rgba(66,133,244,0.10)');g3.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g3;ctx.fillRect(0,0,W,H);
}

// chatTransition: 0=login full grid, 1=chat only input area
let chatProgress = 0;
let chatTransitioning = false;
let chatTransitionStart = 0;
const CHAT_TRANSITION_DUR = 1800; // ms

(function loop(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#07070f';ctx.fillRect(0,0,W,H);
  drawGlow();

  const now = Date.now() / 1000;

  // Animate transition progress
  if(chatTransitioning){
    const elapsed = Date.now() - chatTransitionStart;
    chatProgress = Math.min(1, elapsed / CHAT_TRANSITION_DUR);
    // ease in-out cubic
    const t = chatProgress < 0.5 ? 4*chatProgress*chatProgress*chatProgress : 1-Math.pow(-2*chatProgress+2,3)/2;
    chatProgress = t;
    if(elapsed >= CHAT_TRANSITION_DUR) chatTransitioning = false;
  }

  // In login mode: full bottom grid (yPos threshold 0.38)
  // In chat mode: only around input bar (bottom ~18% of screen)
  const loginThresh = 0.38;
  const chatThresh  = 0.82;
  const yThresh = loginThresh + (chatThresh - loginThresh) * chatProgress;

  // Also shrink horizontal: in chat, only within ~input width centered
  const inputW = Math.min(760, W); // matches max-width of input
  const inputX0 = (W - inputW) / 2;
  const inputX1 = inputX0 + inputW;
  // lerp: login=full width, chat=input width + padding
  const xPad = 60;
  const xMin = inputX0 - xPad;
  const xMax = inputX1 + xPad;
  // fade out cells outside horizontal bounds in chat mode
  const hMaskStrength = chatProgress; // 0=no mask, 1=full mask

  gridCells.forEach(c=>{
    const yPos = c.y / H;
    if(yPos < yThresh) return;

    // vertical fade from threshold
    const fadeRange = 0.20;
    const vertFade = Math.min(1, (yPos - yThresh) / fadeRange);

    // horizontal mask in chat mode
    let hFade = 1;
    if(hMaskStrength > 0){
      const margin = 40;
      if(c.x < xMin - margin) hFade = 0;
      else if(c.x < xMin) hFade = (c.x - (xMin - margin)) / margin;
      else if(c.x > xMax + margin) hFade = 0;
      else if(c.x > xMax) hFade = 1 - (c.x - xMax) / margin;
      hFade = 1 - hMaskStrength * (1 - hFade);
    }

    const pulse = 0.5 + 0.5 * Math.sin(now * c.speed + c.phase);
    const baseA = 0.1 + vertFade * 0.6;
    const a = baseA * (0.35 + 0.65 * pulse) * vertFade * hFade;
    drawCross(c.x, c.y, c.size, a, c.color);
  });

  requestAnimationFrame(loop);
})();

// ── AUTH ──
let isReg=false, fidUserId=null;

function setErr(id,msg){const e=document.getElementById(id);e.style.color='#f87171';e.textContent=msg;}
function setInfo(id,msg){const e=document.getElementById(id);e.style.color='rgba(255,255,255,.35)';e.textContent=msg;}

function toggleMode(){
  isReg=!isReg;
  document.getElementById('regFields').style.display=isReg?'flex':'none';
  document.getElementById('loginFields').style.display=isReg?'none':'flex';
  document.getElementById('switchLink').innerHTML=isReg
    ?'Уже есть аккаунт? <a onclick="toggleMode()">Войти</a>'
    :'Нет аккаунта? <a onclick="toggleMode()">Создать FernieID</a>';
  document.getElementById('authErr').textContent='';
}

async function doLogin(){
  const u=document.getElementById('loginU').value.trim();
  const p=document.getElementById('loginP').value;
  if(!u||!p)return setErr('authErr','Заполни все поля');
  setInfo('authErr','Загрузка...');
  try{
    const d=await FernieID.login(u,p);
    if(!d.success)return setErr('authErr',d.error||'Ошибка входа');
    if(d.require2fa){
      fidUserId=d.userId;
      document.getElementById('step1').style.display='none';
      document.getElementById('loginStar').style.display='none';
      document.getElementById('step2').style.display='block';
      setTimeout(()=>document.getElementById('codeInput').focus(),100);
    } else {
      FernieID.setUser(d);
      enterChat(d);
    }
  }catch(e){setErr('authErr','Ошибка соединения');}
}

async function doVerify(){
  const code=document.getElementById('codeInput').value.trim();
  if(!code)return setErr('authErr2','Введи код');
  setInfo('authErr2','Проверка...');
  try{
    const d=await FernieID.verify2fa(fidUserId,code);
    if(!d.success)return setErr('authErr2',d.error||'Неверный код');
    FernieID.setUser(d);
    enterChat(d);
  }catch(e){setErr('authErr2','Ошибка соединения');}
}

async function doRegister(){
  const u=document.getElementById('regU').value.trim();
  const p=document.getElementById('regP').value;
  const p2=document.getElementById('regP2').value;
  if(!u||!p||!p2)return setErr('authErr','Заполни все поля');
  if(p!==p2)return setErr('authErr','Пароли не совпадают');
  if(p.length<6)return setErr('authErr','Пароль минимум 6 символов');
  setInfo('authErr','Регистрация...');
  try{
    const reg=await FernieID.register(u,p);
    if(!reg.success)return setErr('authErr',reg.error||'Ошибка регистрации');
    setInfo('authErr','Входим...');
    const d=await FernieID.login(u,p);
    if(!d.success)return setErr('authErr',d.error||'Ошибка входа');
    if(d.require2fa){
      fidUserId=d.userId;
      document.getElementById('step1').style.display='none';
      document.getElementById('loginStar').style.display='none';
      document.getElementById('step2').style.display='block';
    } else {
      FernieID.setUser(d);
      enterChat(d);
    }
  }catch(e){setErr('authErr','Ошибка соединения');}
}

function enterChat(userData){
  const ls=document.getElementById('loginScreen');
  ls.style.opacity='0';ls.style.transform='translateY(-30px) scale(.98)';
  ls.style.transition='opacity .55s ease, transform .55s ease';
  setTimeout(()=>{
    ls.classList.add('hidden');
    ls.style.cssText='';
    const cs=document.getElementById('chatScreen');
    cs.classList.remove('hidden');
    cs.style.opacity='0';cs.style.transform='translateY(16px)';cs.style.transition='none';
    requestAnimationFrame(()=>{
      cs.style.transition='opacity .6s ease, transform .6s ease';
      cs.style.opacity='1';cs.style.transform='none';
    });
    // update UI
    const name=userData.username||'Пользователь';
    document.getElementById('userName').textContent=name;
    document.getElementById('userAv').textContent=name[0].toUpperCase();
    const h=new Date().getHours();
    const timeWord=h<12?'Доброе утро':h<17?'Привет':' Добрый вечер';
    document.getElementById('chatTitle').innerHTML=`${timeWord}, <span class="rainbow-name">${name}!</span><br><span style="font-size:.75em;opacity:.7">Что вас интересует?</span>`;
    mode='chat';
    chatTransitioning = true;
    chatTransitionStart = Date.now();
    chatProgress = 0;
  },500);
}

// Auto-login if session saved
const saved=FernieID.getUser();
if(saved){ chatProgress=1; enterChat(saved); }

// ── CHAT ──
let started=false;
function useChip(el){document.getElementById('msgIn').value=el.textContent.slice(2).trim();sendMsg();}

async function sendMsg(){
  const ta=document.getElementById('msgIn');
  const txt=ta.value.trim();
  if(!txt)return;
  if(!started){
    started=true;
    document.getElementById('chatWelcome').style.display='none';
    const m=document.getElementById('msgs');
    m.classList.add('on');
    document.getElementById('chatBody').style.justifyContent='flex-start';
  }
  ta.value='';ta.style.height='auto';
  const msgs=document.getElementById('msgs');
  const ub=document.createElement('div');ub.className='msg-u';ub.textContent=txt;msgs.appendChild(ub);
  const ai=document.createElement('div');ai.className='msg-ai';
  ai.innerHTML=`<div class="msg-ai-ico"><svg viewBox="0 0 48 48"><defs><linearGradient id="aig" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4285f4"/><stop offset="33%" stop-color="#ea4335"/><stop offset="66%" stop-color="#fbbc04"/><stop offset="100%" stop-color="#34a853"/></linearGradient></defs><path d="M24 2C24 14 34 24 46 24C34 24 24 34 24 46C24 34 14 24 2 24C14 24 24 14 24 2Z" fill="url(#aig)"/></svg></div><div class="msg-ai-txt"><div class="typing"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(ai);msgs.scrollTop=msgs.scrollHeight;
  const aiTxt=ai.querySelector('.msg-ai-txt');
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        system:'Ты умный дружелюбный AI-ассистент FernieX. Отвечай кратко, по делу, на языке пользователя.',
        messages:[{role:'user',content:txt}]})
    });
    const data=await res.json();
    const reply=data.content?.find(b=>b.type==='text')?.text||'Ошибка.';
    aiTxt.textContent='';
    let i=0;
    (function type(){if(i<reply.length){aiTxt.textContent+=reply[i++];msgs.scrollTop=msgs.scrollHeight;setTimeout(type,10);}})();
  }catch{aiTxt.textContent='Ошибка соединения.';}
}
</script>
